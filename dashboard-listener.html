<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listener Dashboard — Talk to Me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(145deg, #f7faf7 0%, #e8f5e9 30%, #fff8e1 60%, #f1f8e9 100%);
            color: #1a2a1f;
            line-height: 1.7;
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 60px;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0,0,0,0.04);
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #2D6A4F;
        }

        .logo span {
            color: #6C63FF;
        }

        nav a {
            margin: 0 12px;
            text-decoration: none;
            color: #1A1A2E;
            font-weight: 500;
            font-size: 14px;
        }

        nav a:hover {
            color: #2D6A4F;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #2D6A4F;
            color: #2D6A4F;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            font-size: 13px;
        }

        .btn-outline:hover {
            background: #2D6A4F;
            color: white;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .dashboard-header h1 {
            font-size: 32px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.85);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #2D6A4F;
        }

        .stat-card .label {
            font-size: 14px;
            color: #5a6a5a;
        }

        .status-toggle-container {
            background: rgba(255,255,255,0.85);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .status-toggle {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .toggle-track {
            width: 60px;
            height: 32px;
            background: #ccc;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }

        .toggle-track.active {
            background: #2D6A4F;
        }

        .toggle-thumb {
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }

        .toggle-track.active .toggle-thumb {
            transform: translateX(28px);
        }

        .status-text.online {
            color: #34D399;
            font-weight: 600;
        }

        .status-text.offline {
            color: #6B7280;
            font-weight: 600;
        }

        .membership-status {
            background: rgba(255,255,255,0.85);
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .membership-status.active {
            border-color: #34D399;
            background: #f0fdf4;
        }

        .membership-status.expiring {
            border-color: #F59E0B;
            background: #fffbeb;
        }

        .membership-status.expired {
            border-color: #EF4444;
            background: #fef2f2;
        }

        .membership-status .status-badge {
            font-weight: 600;
        }

        .membership-status .days {
            font-weight: 700;
            color: #2D6A4F;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 15px 0;
        }

        .section-header h2 {
            font-size: 22px;
        }

        .badge {
            background: #2D6A4F;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .booking-card, .session-card {
            background: rgba(255,255,255,0.85);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .booking-card .booking-time {
            font-weight: 600;
        }

        .booking-card .booking-tier {
            color: #5a6a5a;
            font-size: 14px;
        }

        .booking-card .booking-note {
            color: #5a6a5a;
            font-size: 14px;
            font-style: italic;
        }

        .btn-small {
            padding: 8px 20px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-small:hover {
            transform: translateY(-2px);
        }

        .btn-small.primary {
            background: #2D6A4F;
            color: white;
        }

        .btn-small.success {
            background: #34D399;
            color: white;
        }

        .btn-small.danger {
            background: #EF4444;
            color: white;
        }

        .btn-small.chat {
            background: #6C63FF;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #5a6a5a;
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .login-overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .login-card {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #2D6A4F;
        }

        .login-card .subtitle {
            text-align: center;
            color: #5a6a5a;
            margin-bottom: 20px;
        }

        .login-card .form-group {
            margin-bottom: 15px;
        }

        .login-card .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .login-card .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
        }

        .login-card .form-group input:focus {
            border-color: #2D6A4F;
            outline: none;
        }

        .login-card .btn-primary {
            width: 100%;
            padding: 14px;
            background: #2D6A4F;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }

        .login-card .btn-primary:hover {
            background: #1B4332;
        }

        .login-card .apply-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #5a6a5a;
        }

        .login-card .apply-link a {
            color: #2D6A4F;
            text-decoration: none;
        }

        .login-card .apply-link a:hover {
            text-decoration: underline;
        }

        .earnings-list {
            list-style: none;
            padding: 0;
        }

        .earnings-list li {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .withdraw-btn {
            width: 100%;
            padding: 14px;
            background: #34D399;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .withdraw-btn:hover {
            background: #10B981;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #25D366;
            color: white;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            z-index: 1000;
            transition: all 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.5);
        }

        .whatsapp-float img {
            width: 28px;
            height: 28px;
            filter: brightness(0) invert(1);
        }

        .whatsapp-float span {
            color: white;
        }

        footer {
            padding: 30px 60px;
            text-align: center;
            background: #1a2a1f;
            color: rgba(255,255,255,0.7);
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            nav {
                padding: 12px 20px;
                justify-content: center;
            }
            .dashboard-container {
                padding: 0 15px;
            }
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .booking-card, .session-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .whatsapp-float {
                bottom: 80px;
                right: 10px;
                padding: 10px 15px;
                font-size: 12px;
            }
            .whatsapp-float img {
                width: 22px;
                height: 22px;
            }
            .whatsapp-float span {
                display: none;
            }
            footer {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🌿 <span>Talk to Me</span></div>
        <div>
            <a href="/">Home</a>
            <a href="/onboard.html">Apply</a>
            <a href="https://wa.me/254700886207?text=Hi%20Talk%20to%20Me!" target="_blank" style="color:#25D366;font-weight:600;">📱 WhatsApp</a>
            <button class="btn-outline" onclick="logout()">🚪 Logout</button>
        </div>
    </nav>

    <div class="dashboard-container" id="dashboard-content">
        <!-- Content loaded by JavaScript -->
    </div>

    <footer>
        <p>© 2026 Talk to Me — We're all in this together. ❤️</p>
    </footer>

    <a href="https://wa.me/254700886207?text=Hello%20Talk%20to%20Me!%20I%20need%20support..." 
       class="whatsapp-float" 
       target="_blank"
       rel="noopener noreferrer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        <span>Chat on WhatsApp</span>
    </a>

    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/6a5540c5550ea31d480b6301/1jtega1mn';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>

    <script>
        const listenerToken = localStorage.getItem('listener_token');

        async function loadDashboard() {
            if (!listenerToken) {
                showLogin();
                return;
            }

            try {
                const response = await fetch(`/api/listener/dashboard/${listenerToken}`);
                const data = await response.json();

                if (!data.success) {
                    localStorage.removeItem('listener_token');
                    showLogin();
                    return;
                }

                renderDashboard(data.listener);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showLogin();
            }
        }

        function showLogin() {
            document.getElementById('dashboard-content').innerHTML = `
                <div class="login-overlay">
                    <div class="login-card">
                        <h2>👂 Listener Login</h2>
                        <p class="subtitle">Access your listener dashboard</p>
                        <form id="login-form">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="login-email" required placeholder="your@email.com">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="login-password" required placeholder="Your password">
                            </div>
                            <button type="submit" class="btn-primary">🔐 Login</button>
                        </form>
                        <div class="apply-link">
                            Don't have an account? <a href="/onboard.html">Apply here</a>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('login-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                try {
                    const response = await fetch('/api/listener/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (data.success) {
                        localStorage.setItem('listener_token', data.token);
                        loadDashboard();
                    } else {
                        alert(data.error || 'Invalid email or password.');
                    }
                } catch (error) {
                    alert('Login failed. Please try again.');
                }
            });
        }

        function renderDashboard(listener) {
            const container = document.getElementById('dashboard-content');

            let membershipHTML = '';
            if (listener.membershipStatus === 'active') {
                membershipHTML = `
                    <div class="membership-status active">
                        ✅ <span class="status-badge">Membership Active</span>
                        — <span class="days">${listener.daysRemaining || 365} days</span> remaining
                    </div>
                `;
            } else if (listener.membershipStatus === 'expiring_soon') {
                membershipHTML = `
                    <div class="membership-status expiring">
                        ⚠️ <span class="status-badge">Membership Expiring Soon</span>
                        — <span class="days">${listener.daysRemaining || 0} days</span> remaining
                        <button onclick="renewMembership()" class="btn-small primary" style="margin-left:10px;">Renew Now</button>
                    </div>
                `;
            } else if (listener.membershipStatus === 'expired') {
                membershipHTML = `
                    <div class="membership-status expired">
                        ❌ <span class="status-badge">Membership Expired</span>
                        <button onclick="renewMembership()" class="btn-small primary" style="margin-left:10px;">Renew Now</button>
                    </div>
                `;
            } else {
                membershipHTML = `
                    <div class="membership-status" style="border-color:#3B82F6;background:#EFF6FF;">
                        ⏳ <span class="status-badge">Membership Pending</span>
                        <button onclick="renewMembership()" class="btn-small primary" style="margin-left:10px;">Pay Now</button>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="dashboard-header">
                    <div>
                        <h1>👂 Welcome, ${listener.fullName || 'Listener'}!</h1>
                        <p style="color:#2D6A4F;font-size:14px;">📛 Clients see you as: <strong>${listener.nickname || 'Loading...'}</strong></p>
                    </div>
                    <div>
                        <span style="color:#5a6a5a;font-size:14px;">Status:</span>
                        <span class="status-text ${listener.isOnline ? 'online' : 'offline'}">
                            ${listener.isOnline ? '🟢 Online' : '⚪ Offline'}
                        </span>
                    </div>
                </div>

                ${membershipHTML}

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="value">${listener.availableBookings || 0}</div>
                        <div class="label">Available Sessions</div>
                    </div>
                    <div class="stat-card">
                        <div class="value">${listener.sessionsCompleted || 0}</div>
                        <div class="label">Sessions Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="value">$${listener.balance || 0}</div>
                        <div class="label">Balance</div>
                    </div>
                    <div class="stat-card">
                        <div class="value">${listener.rating || 0}⭐</div>
                        <div class="label">Rating</div>
                    </div>
                </div>

                <div class="status-toggle-container">
                    <div class="status-toggle">
                        <span>📢 Availability:</span>
                        <div class="toggle-track ${listener.isOnline ? 'active' : ''}" id="toggle-track">
                            <div class="toggle-thumb"></div>
                        </div>
                        <span class="status-text ${listener.isOnline ? 'online' : 'offline'}" id="status-label">
                            ${listener.isOnline ? 'Online' : 'Offline'}
                        </span>
                    </div>
                    <div style="font-size:14px;color:#5a6a5a;">
                        Current sessions: ${listener.activeSessions || 0}/1
                    </div>
                </div>

                <div class="section-header">
                    <h2>📋 Available Sessions</h2>
                    <span class="badge" id="available-count">${listener.availableBookings || 0}</span>
                </div>
                <div id="available-list">
                    <div class="empty-state">
                        <div class="emoji">📭</div>
                        <p>No sessions available right now</p>
                    </div>
                </div>

                <div class="section-header">
                    <h2>✅ My Sessions</h2>
                </div>
                <div id="my-sessions">
                    <div class="empty-state">
                        <div class="emoji">📋</div>
                        <p>You haven't accepted any sessions yet</p>
                    </div>
                </div>

                <div class="section-header">
                    <h2>💰 Earnings</h2>
                </div>
                <ul class="earnings-list" id="earnings-list">
                    <li style="color:#5a6a5a;text-align:center;padding:20px;">No earnings yet</li>
                </ul>

                <button class="withdraw-btn" id="withdraw-btn" onclick="withdrawEarnings()">
                    💳 Withdraw Balance
                </button>
            `;

            loadAvailableBookings();
            loadMySessions();
            loadEarnings();

            document.getElementById('toggle-track').addEventListener('click', toggleStatus);
        }

        async function toggleStatus() {
            const token = localStorage.getItem('listener_token');
            const track = document.getElementById('toggle-track');
            const label = document.getElementById('status-label');

            const isOnline = track.classList.contains('active');

            try {
                const response = await fetch('/api/listener/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, isOnline: !isOnline })
                });

                const data = await response.json();

                if (data.success) {
                    track.classList.toggle('active');
                    const newStatus = track.classList.contains('active');
                    label.textContent = newStatus ? 'Online' : 'Offline';
                    label.className = 'status-text ' + (newStatus ? 'online' : 'offline');
                }
            } catch (error) {
                alert('Error updating status.');
            }
        }

        async function loadAvailableBookings() {
            const token = localStorage.getItem('listener_token');

            try {
                const response = await fetch(`/api/listener/bookings/${token}`);
                const bookings = await response.json();

                const container = document.getElementById('available-list');
                const count = document.getElementById('available-count');

                if (!container) return;

                if (bookings.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="emoji">📭</div>
                            <p>No sessions available right now</p>
                        </div>
                    `;
                    if (count) count.textContent = '0';
                    return;
                }

                if (count) count.textContent = bookings.length;

                container.innerHTML = bookings.map(booking => `
                    <div class="booking-card">
                        <div>
                            <div class="booking-time">📅 ${new Date(booking.scheduledAt).toLocaleString()}</div>
                            <div class="booking-tier">⏱️ ${booking.tier === 'standard' ? '30 min' : '60 min'} — $${booking.price/100}</div>
                            ${booking.note ? `<div class="booking-note">📝 ${booking.note}</div>` : ''}
                        </div>
                        <button onclick="acceptBooking('${booking.id}')" class="btn-small primary">✅ Accept</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading bookings:', error);
            }
        }

        async function acceptBooking(sessionId) {
            const token = localStorage.getItem('listener_token');

            if (!confirm('Accept this session? The client will be notified.')) return;

            try {
                const response = await fetch('/api/listener/accept', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, token })
                });

                const data = await response.json();

                if (data.success) {
                    alert('✅ Session accepted! The client has been notified.');
                    loadDashboard();
                } else {
                    alert(data.message || 'Failed to accept booking.');
                }
            } catch (error) {
                alert('Error accepting booking.');
            }
        }

        async function loadMySessions() {
            const token = localStorage.getItem('listener_token');

            try {
                const response = await fetch(`/api/listener/my-sessions/${token}`);
                const sessions = await response.json();

                const container = document.getElementById('my-sessions');
                if (!container) return;

                if (sessions.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="emoji">📋</div>
                            <p>You haven't accepted any sessions yet</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = sessions.map(session => {
                    const statusEmoji = session.status === 'booked' ? '⏳' :
                                      session.status === 'accepted' ? '✅' :
                                      session.status === 'active' ? '🔴' : '✔️';
                    const isTime = session.scheduledAt <= Date.now();
                    const canJoin = (session.status === 'accepted' || session.status === 'active') && isTime;

                    return `
                        <div class="session-card">
                            <div>
                                <div class="booking-time">${statusEmoji} ${new Date(session.scheduledAt).toLocaleString()}</div>
                                <div style="font-size:14px;color:#5a6a5a;">
                                    ${session.tier === 'standard' ? '30 min' : '60 min'} • Status: ${session.status}
                                </div>
                            </div>
                            <div>
                                ${canJoin ? 
                                    `<button onclick="joinListenerSession('${session.id}')" class="btn-small success">🔗 Join</button>
                                     <button onclick="openChat('${session.id}', 'listener')" class="btn-small chat">💬 Chat</button>` :
                                    session.status === 'active' ?
                                    `<button onclick="joinListenerSession('${session.id}')" class="btn-small danger">🔴 Join Now</button>
                                     <button onclick="openChat('${session.id}', 'listener')" class="btn-small chat">💬 Chat</button>` :
                                    `<span style="color:#5a6a5a;font-size:14px;">${isTime ? 'Session ended' : '⏳ Upcoming'}</span>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading my sessions:', error);
            }
        }

        function openChat(sessionId, role) {
            window.location.href = `/chat.html?session=${sessionId}&role=${role}`;
        }

        async function joinListenerSession(sessionId) {
            const token = localStorage.getItem('listener_token');

            try {
                const response = await fetch('/api/listener/join-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, token })
                });

                const data = await response.json();

                if (data.success && data.isTime) {
                    window.location.href = `/call.html?session=${sessionId}&role=listener`;
                } else if (!data.isTime && data.scheduledAt) {
                    const waitTime = Math.floor((data.scheduledAt - Date.now()) / 60000);
                    alert(`⏳ Please wait ${waitTime} minutes until the session time.`);
                } else {
                    alert(data.message || 'Session not ready yet.');
                }
            } catch (error) {
                alert('Error joining session.');
            }
        }

        async function loadEarnings() {
            const token = localStorage.getItem('listener_token');

            try {
                const response = await fetch(`/api/listener/earnings/${token}`);
                const earnings = await response.json();

                const container = document.getElementById('earnings-list');
                if (!container) return;

                if (earnings.length === 0) {
                    container.innerHTML = `
                        <li style="color:#5a6a5a;text-align:center;padding:20px;">No earnings yet</li>
                    `;
                    return;
                }

                container.innerHTML = earnings.map(item => `
                    <li>
                        <span>${new Date(item.date).toLocaleDateString()}</span>
                        <span>${item.tier} — $${item.amount}</span>
                        <span style="color:#34D399;">${item.status}</span>
                    </li>
                `).join('');
            } catch (error) {
                console.error('Error loading earnings:', error);
            }
        }

        async function withdrawEarnings() {
            const token = localStorage.getItem('listener_token');

            if (!confirm('Withdraw all earnings to your M-Pesa?')) return;

            try {
                const response = await fetch('/api/listener/withdraw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (data.success) {
                    alert(`✅ $${data.amount} withdrawn to M-Pesa!`);
                    loadDashboard();
                } else {
                    alert(data.message || 'Withdrawal failed.');
                }
            } catch (error) {
                alert('Error processing withdrawal.');
            }
        }

        async function renewMembership() {
            const email = prompt('Please enter your email address to renew:');
            if (!email) return;

            try {
                const response = await fetch('/api/listener/initiate-membership', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        fullName: 'Listener',
                        mpesaNumber: '0712345678',
                        applicationId: 'renewal_' + Date.now()
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('✅ Membership activated!');
                    loadDashboard();
                } else {
                    alert('Renewal failed. Please try again.');
                }
            } catch (error) {
                alert('Error processing renewal.');
                console.error(error);
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('listener_token');
                loadDashboard();
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
