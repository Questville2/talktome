<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Talk to Me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(145deg, #f7faf7 0%, #e8f5e9 30%, #fff8e1 60%, #f1f8e9 100%);
            color: #1a2a1f;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(16px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #2D6A4F;
        }

        .logo span {
            color: #6C63FF;
        }

        .chat-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            color: #5a6a5a;
        }

        .chat-info .nickname {
            font-weight: 600;
            color: #2D6A4F;
        }

        .btn-small {
            background: #EF4444;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: background 0.3s;
        }

        .btn-small:hover {
            background: #DC2626;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }

        .message.client {
            background: #2D6A4F;
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .message.listener {
            background: #f0f0f0;
            color: #1a2a1f;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message .sender {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .message .text {
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message .timestamp {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }

        .message.system {
            background: #FEF3C7;
            color: #D97706;
            align-self: center;
            max-width: 90%;
            text-align: center;
            font-size: 13px;
            border-radius: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 50px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
            background: white;
        }

        .input-area input:focus {
            border-color: #2D6A4F;
            outline: none;
        }

        .input-area button {
            padding: 12px 30px;
            background: #2D6A4F;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .input-area button:hover {
            background: #1B4332;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(45, 106, 79, 0.3);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #5a6a5a;
            text-align: center;
            padding: 40px;
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state h3 {
            color: #1a2a1f;
            margin-bottom: 10px;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #25D366;
            color: white;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            z-index: 1000;
            transition: all 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.5);
        }

        .whatsapp-float img {
            width: 28px;
            height: 28px;
            filter: brightness(0) invert(1);
        }

        .whatsapp-float span {
            color: white;
        }

        .typing-indicator {
            color: #5a6a5a;
            font-size: 13px;
            padding: 5px 10px;
            font-style: italic;
            display: none;
        }

        .typing-indicator.active {
            display: block;
        }

        @media (max-width: 768px) {
            nav {
                padding: 10px 15px;
            }
            .chat-container {
                padding: 10px;
            }
            .message {
                max-width: 90%;
            }
            .input-area input {
                font-size: 14px;
                padding: 10px 14px;
            }
            .input-area button {
                padding: 10px 20px;
                font-size: 14px;
            }
            .whatsapp-float {
                bottom: 80px;
                right: 10px;
                padding: 10px 15px;
                font-size: 12px;
            }
            .whatsapp-float img {
                width: 22px;
                height: 22px;
            }
            .whatsapp-float span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🌿 <span>Talk to Me</span></div>
        <div class="chat-info">
            <span>💬 Chat</span>
            <span class="nickname" id="my-nickname">Loading...</span>
            <span id="session-time">⏱️ 0:00</span>
            <button class="btn-small" onclick="endChat()">✕ End</button>
        </div>
    </nav>

    <div class="chat-container">
        <div class="messages-area" id="messages-area">
            <div class="empty-state" id="empty-state">
                <div class="emoji">💬</div>
                <h3>You're connected!</h3>
                <p>Start your conversation below. You're completely anonymous.</p>
                <p style="font-size:14px;color:#2D6A4F;margin-top:10px;">🛡️ Your real identity is hidden</p>
            </div>
            <div id="messages-list"></div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            <span>💭 Someone is typing...</span>
        </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type your message..." autofocus>
            <button id="send-btn" onclick="sendMessage()">📤 Send</button>
        </div>
    </div>

    <a href="https://wa.me/254700886207?text=Hello%20Talk%20to%20Me!%20I%20need%20support..." 
       class="whatsapp-float" 
       target="_blank"
       rel="noopener noreferrer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        <span>Chat on WhatsApp</span>
    </a>

    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/6a5540c5550ea31d480b6301/1jtega1mn';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session');
        const token = localStorage.getItem('session_token') || localStorage.getItem('listener_token');
        const role = params.get('role') || 'client';

        let myNickname = '';
        let otherNickname = '';
        let messageInterval = null;
        let startTime = Date.now();

        async function initChat() {
            if (!sessionId || !token) {
                alert('Invalid session. Please try again.');
                window.location.href = '/';
                return;
            }

            try {
                const clientResponse = await fetch(`/api/chat/client-nickname/${sessionId}`);
                const clientData = await clientResponse.json();
                const clientNickname = clientData.nickname;

                const listenerResponse = await fetch(`/api/chat/listener-nickname/${sessionId}`);
                const listenerData = await listenerResponse.json();
                const listenerNickname = listenerData.nickname;

                if (role === 'client') {
                    myNickname = clientNickname;
                    otherNickname = listenerNickname || 'Listener';
                } else {
                    myNickname = listenerNickname || 'Listener';
                    otherNickname = clientNickname;
                }

                document.getElementById('my-nickname').textContent = myNickname;
                await loadChatHistory();
                startTimer();
                startPolling();

            } catch (error) {
                console.error('Error initializing chat:', error);
                alert('Error connecting to chat. Please refresh.');
            }
        }

        async function loadChatHistory() {
            try {
                const response = await fetch(`/api/chat/history/${sessionId}?token=${token}&role=${role}`);
                const data = await response.json();
                
                const messagesList = document.getElementById('messages-list');
                const emptyState = document.getElementById('empty-state');
                
                if (data.messages && data.messages.length > 0) {
                    emptyState.style.display = 'none';
                    messagesList.innerHTML = '';
                    data.messages.forEach(msg => addMessageToUI(msg));
                    scrollToBottom();
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
            }
        }

        function addMessageToUI(msg) {
            const messagesList = document.getElementById('messages-list');
            const emptyState = document.getElementById('empty-state');
            
            if (emptyState) emptyState.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            let isMine = false;
            let messageClass = 'message ';
            
            if (msg.senderType === 'client' && role === 'client') {
                isMine = true;
                messageClass += 'client';
            } else if (msg.senderType === 'listener' && role === 'listener') {
                isMine = true;
                messageClass += 'client';
            } else {
                messageClass += 'listener';
            }
            
            if (msg.sender === 'System') messageClass += ' system';
            
            messageDiv.className = messageClass;
            
            const time = new Date(msg.timestamp);
            const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let displayName = '';
            if (!isMine && msg.sender !== 'System') {
                displayName = `<div class="sender">${msg.sender}</div>`;
            } else if (msg.sender === 'System') {
                displayName = '';
            } else {
                displayName = `<div class="sender" style="opacity:0.5;text-align:right;">You</div>`;
            }
            
            messageDiv.innerHTML = `
                ${displayName}
                <div class="text">${escapeHtml(msg.message)}</div>
                <div class="timestamp">${timeStr}</div>
            `;
            
            messagesList.appendChild(messageDiv);
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;
            
            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.textContent = '⏳';
            
            try {
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId, sender: myNickname, message, senderType: role
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    input.value = '';
                    addMessageToUI(data.message);
                } else {
                    alert('Failed to send message. Please try again.');
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Error sending message.');
            }
            
            btn.disabled = false;
            btn.textContent = '📤 Send';
            input.focus();
        }

        function startPolling() {
            let lastMessageCount = 0;
            fetch(`/api/chat/history/${sessionId}?token=${token}&role=${role}`)
                .then(res => res.json())
                .then(data => { if (data.messages) lastMessageCount = data.messages.length; })
                .catch(() => {});
            
            messageInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/chat/history/${sessionId}?token=${token}&role=${role}`);
                    const data = await response.json();
                    if (data.messages && data.messages.length > lastMessageCount) {
                        const newMessages = data.messages.slice(lastMessageCount);
                        newMessages.forEach(msg => {
                            if (msg.sender !== myNickname || msg.senderType !== role) {
                                addMessageToUI(msg);
                            }
                        });
                        lastMessageCount = data.messages.length;
                    }
                } catch (error) {}
            }, 2000);
        }

        function startTimer() {
            setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const secs = String(elapsed % 60).padStart(2, '0');
                document.getElementById('session-time').textContent = `⏱️ ${mins}:${secs}`;
            }, 1000);
        }

        function scrollToBottom() {
            const area = document.getElementById('messages-area');
            area.scrollTop = area.scrollHeight;
        }

        function endChat() {
            if (confirm('Are you sure you want to end this chat session?')) {
                if (messageInterval) clearInterval(messageInterval);
                if (role === 'client') window.location.href = '/dashboard-client.html';
                else window.location.href = '/dashboard-listener.html';
            }
        }

        document.getElementById('message-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.addEventListener('DOMContentLoaded', initChat);
    </script>
</body>
</html>
